            assert.equal(
              selecionarAtendenteTransferencia({
                estrategia: "menos_conversas",
                candidatos,
                random: () => 0.9,
              })?.id,
              "c"
            );
          });

          test("fila do setor nao atribui responsavel", () => {
            assert.equal(
              selecionarAtendenteTransferencia({
                estrategia: "fila_setor",
                candidatos,
              }),
              null
            );
          });
          '''
          write(
              "tests/transferencia-atendente.test.mts",
              textwrap.dedent(tests).lstrip(),
