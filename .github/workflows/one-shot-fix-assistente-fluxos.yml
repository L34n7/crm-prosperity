name: One-shot fix assistente de fluxos
# Segundo push para acionar o workflow ja registrado na branch principal.

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-shot-fix-assistente-fluxos.yml

permissions:
  contents: write

jobs:
  aplicar-correcao:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Aplicar correção
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          path = Path("src/app/api/automacoes/assistente/gerar/route.ts")
          source = path.read_text(encoding="utf-8")

          replacements = []

          replacements.append((
          '''import {
            extrairUsoTokensIa,
            registrarUsoTokensIa,
            SaldoTokensIaEsgotadoError,
            verificarSaldoTokensIa,
          } from "@/lib/ia/tokens";''',
          '''import {
            extrairUsoTokensIa,
            registrarUsoTokensIa,
            SaldoTokensIaEsgotadoError,
            verificarSaldoTokensIa,
            type UsoTokensIa,
          } from "@/lib/ia/tokens";'''
          ))

          replacements.append((
          '''const MODELOS_ASSISTENTE_FLUXOS =
            process.env.OPENAI_ASSISTENTE_FLUXOS_MODEL || "gpt-5.4-mini";
          const PREFIXO_FLUXO_IA = "✨ IA - ";''',
          '''const MODELOS_ASSISTENTE_FLUXOS =
            process.env.OPENAI_ASSISTENTE_FLUXOS_MODEL || "gpt-5.4-mini";
          const MAX_OUTPUT_TOKENS_ASSISTENTE = (() => {
            const configurado = Number(
              process.env.OPENAI_ASSISTENTE_FLUXOS_MAX_OUTPUT_TOKENS || 14000
            );

            if (!Number.isFinite(configurado)) return 14000;

            return Math.max(4200, Math.min(24000, Math.floor(configurado)));
          })();
          const MAX_TENTATIVAS_GERACAO_ASSISTENTE = 2;
          const PREFIXO_FLUXO_IA = "✨ IA - ";

          class RespostaAssistenteInvalidaError extends Error {
            constructor(
              message: string,
              readonly uso: UsoTokensIa,
              readonly motivo: string
            ) {
              super(message);
              this.name = "RespostaAssistenteInvalidaError";
            }
          }

          function somarUsoTokensIa(
            atual: UsoTokensIa,
            proximo: UsoTokensIa
          ): UsoTokensIa {
            return {
              inputTokens:
                atual.inputTokens === null && proximo.inputTokens === null
                  ? null
                  : (atual.inputTokens ?? 0) + (proximo.inputTokens ?? 0),
              outputTokens:
                atual.outputTokens === null && proximo.outputTokens === null
                  ? null
                  : (atual.outputTokens ?? 0) + (proximo.outputTokens ?? 0),
              totalTokens: atual.totalTokens + proximo.totalTokens,
            };
          }'''
          ))

          replacements.append((
          '''- Para pergunta_botoes, gere no maximo 3 opcoes.
          - Para capturar_resposta, use somente uma variavel personalizada em snake_case.''',
          '''- Para pergunta_botoes, gere no maximo 3 opcoes.
          - Quando houver mais de 3 opcoes, use pergunta_opcoes, que aceita ate 10 itens. Se o usuario exigir botoes, divida as opcoes em submenus de no maximo 3 botoes sem omitir nenhum caminho.
          - Seja conciso: objetivo e resumo devem ser breves, e cada mensagem deve preferencialmente ter ate 700 caracteres.
          - Nao repita no resumo a arvore que ja esta representada em etapas e rotas.
          - Preserve todos os caminhos solicitados, mas evite repetir explicacoes identicas em campos diferentes.
          - Para capturar_resposta, use somente uma variavel personalizada em snake_case.'''
          ))

          replacements.append((
          '''async function solicitarPlanoAssistente(params: {
            modo: ModoAssistenteFluxos;
            contexto: Record<string, unknown>;
            instrucaoAdicional?: string;
          }) {
            const resposta = await openai.responses.create({
              model: MODELOS_ASSISTENTE_FLUXOS,
              input: [
                {
                  role: "system",
                  content: [
                    montarPromptSistema(params.modo),
                    params.instrucaoAdicional || "",
                  ]
                    .filter(Boolean)
                    .join("\\n\\n"),
                },
                {
                  role: "user",
                  content: JSON.stringify(params.contexto),
                },
              ],
              max_output_tokens: 4200,
              text: {
                format: {
                  type: "json_schema",
                  name: "plano_assistente_fluxos",
                  strict: true,
                  schema: planoAssistenteSchema as Record<string, unknown>,
                },
              },
            });

            return {
              plano: normalizarPlanoAssistente(
                JSON.parse(resposta.output_text || "{}")
              ),
              uso: extrairUsoTokensIa(resposta.usage),
            };
          }''',
          '''async function solicitarPlanoAssistente(params: {
            modo: ModoAssistenteFluxos;
            contexto: Record<string, unknown>;
            instrucaoAdicional?: string;
          }) {
            let usoTotal: UsoTokensIa = {
              inputTokens: null,
              outputTokens: null,
              totalTokens: 0,
            };
            let ultimoMotivo = "resposta_invalida";

            for (
              let tentativa = 1;
              tentativa <= MAX_TENTATIVAS_GERACAO_ASSISTENTE;
              tentativa += 1
            ) {
              const instrucaoTentativa = [
                params.instrucaoAdicional || "",
                tentativa > 1
                  ? `A tentativa anterior nao produziu um JSON completo e valido.
          - Gere novamente o plano completo, sem omitir etapas ou rotas solicitadas.
          - Reduza objetivo, resumo e mensagens ao essencial.
          - Nao repita a arvore no resumo.
          - Para menus com mais de 3 itens, use pergunta_opcoes; se botoes forem obrigatorios, divida em submenus de ate 3 botoes.
          - Retorne somente o JSON final conforme o schema.`
                  : "",
              ]
                .filter(Boolean)
                .join("\\n\\n");

              const resposta = await openai.responses.create({
                model: MODELOS_ASSISTENTE_FLUXOS,
                input: [
                  {
                    role: "system",
                    content: [
                      montarPromptSistema(params.modo),
                      instrucaoTentativa,
                    ]
                      .filter(Boolean)
                      .join("\\n\\n"),
                  },
                  {
                    role: "user",
                    content: JSON.stringify(params.contexto),
                  },
                ],
                max_output_tokens: MAX_OUTPUT_TOKENS_ASSISTENTE,
                text: {
                  format: {
                    type: "json_schema",
                    name: "plano_assistente_fluxos",
                    strict: true,
                    schema: planoAssistenteSchema as Record<string, unknown>,
                  },
                },
              });
              const respostaEstruturada = resposta as unknown as {
                id?: string;
                status?: string;
                output_text?: string;
                usage?: unknown;
                incomplete_details?: {
                  reason?: string | null;
                } | null;
              };
              const usoTentativa = extrairUsoTokensIa(respostaEstruturada.usage);
              usoTotal = somarUsoTokensIa(usoTotal, usoTentativa);

              const conteudo = String(respostaEstruturada.output_text || "").trim();
              const status = respostaEstruturada.status || "completed";
              const motivoIncompleto =
                respostaEstruturada.incomplete_details?.reason || null;

              if (status !== "completed" || motivoIncompleto || !conteudo) {
                ultimoMotivo =
                  motivoIncompleto || (conteudo ? status : "resposta_vazia");

                console.error("[assistente-fluxos] resposta da IA incompleta", {
                  response_id: respostaEstruturada.id || null,
                  status,
                  motivo: ultimoMotivo,
                  tentativa,
                  output_length: conteudo.length,
                  max_output_tokens: MAX_OUTPUT_TOKENS_ASSISTENTE,
                });

                if (tentativa < MAX_TENTATIVAS_GERACAO_ASSISTENTE) {
                  continue;
                }

                break;
              }

              try {
                return {
                  plano: normalizarPlanoAssistente(JSON.parse(conteudo)),
                  uso: usoTotal,
                };
              } catch (error) {
                ultimoMotivo = "json_invalido";

                console.error("[assistente-fluxos] JSON invalido retornado pela IA", {
                  response_id: respostaEstruturada.id || null,
                  status,
                  tentativa,
                  output_length: conteudo.length,
                  error: error instanceof Error ? error.message : String(error),
                });

                if (tentativa < MAX_TENTATIVAS_GERACAO_ASSISTENTE) {
                  continue;
                }
              }
            }

            const excedeuLimite = [
              "max_output_tokens",
              "max_tokens",
            ].includes(ultimoMotivo);

            throw new RespostaAssistenteInvalidaError(
              excedeuLimite
                ? "O fluxo solicitado ficou muito grande para ser concluido de uma vez. A IA tentou gerar uma versao mais compacta, mas nao conseguiu finalizar toda a estrutura. Nenhum fluxo incompleto foi criado."
                : "A IA nao conseguiu concluir uma estrutura valida para este fluxo. Nenhum fluxo incompleto foi criado. Tente novamente mantendo os mesmos requisitos.",
              usoTotal,
              ultimoMotivo
            );
          }'''
          ))

          replacements.append((
          '''  const sessaoId = texto(body?.sessao_id || body?.sessaoId, 120);

            try {''',
          '''  const sessaoId = texto(body?.sessao_id || body?.sessaoId, 120);
            let contextoUsoErro: {
              empresaId: string;
              usuarioId: string;
            } | null = null;

            try {'''
          ))

          replacements.append((
          '''    if (!usuario.empresa_id) {
              return NextResponse.json(
                { ok: false, error: "Usuario sem empresa vinculada." },
                { status: 400 }
              );
            }

            if (modo === "criar_fluxo" && acao === "responder") {''',
          '''    if (!usuario.empresa_id) {
              return NextResponse.json(
                { ok: false, error: "Usuario sem empresa vinculada." },
                { status: 400 }
              );
            }

            contextoUsoErro = {
              empresaId: usuario.empresa_id,
              usuarioId: usuario.id,
            };

            if (modo === "criar_fluxo" && acao === "responder") {'''
          ))

          replacements.append((
          '''  } catch (error: unknown) {
            if (error instanceof SaldoTokensIaEsgotadoError) {''',
          '''  } catch (error: unknown) {
            if (error instanceof RespostaAssistenteInvalidaError) {
              if (contextoUsoErro && error.uso.totalTokens > 0) {
                try {
                  await registrarUsoTokensIa({
                    empresaId: contextoUsoErro.empresaId,
                    usuarioId: contextoUsoErro.usuarioId,
                    origem: "assistente_fluxos",
                    modelo: MODELOS_ASSISTENTE_FLUXOS,
                    uso: error.uso,
                    metadata: {
                      modo,
                      etapa: "falha_resposta_estruturada",
                      motivo: error.motivo,
                    },
                  });
                } catch (registroError) {
                  console.warn(
                    "[assistente-fluxos] nao foi possivel registrar tokens da geracao com falha",
                    registroError
                  );
                }
              }

              return NextResponse.json(
                {
                  ok: false,
                  code: "RESPOSTA_IA_INCOMPLETA",
                  error: error.message,
                },
                { status: 422 }
              );
            }

            if (error instanceof SaldoTokensIaEsgotadoError) {'''
          ))

          for old, new in replacements:
              count = source.count(old)
              if count != 1:
                  raise SystemExit(
                      f"Trecho esperado nao encontrado de forma unica (ocorrencias={count}): {old[:120]!r}"
                  )
              source = source.replace(old, new, 1)

          path.write_text(source, encoding="utf-8")
          PY

      - name: Instalar dependências
        run: npm ci

      - name: Validar arquivo alterado
        run: npx eslint src/app/api/automacoes/assistente/gerar/route.ts

      - name: Publicar correção e remover workflow temporário
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/api/automacoes/assistente/gerar/route.ts
          git rm .github/workflows/one-shot-fix-assistente-fluxos.yml
          git commit -m "Corrigir geração de fluxos longos pela IA"
          git push origin main
