name: Implementar versoes de fluxos

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/implementar-versoes-fluxos.yml

permissions:
  contents: write

jobs:
  implementar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Implementar versionamento interno
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              if old not in text:
                  raise SystemExit(f'Trecho nao encontrado: {label}')
              return text.replace(old, new, 1)

          migration = r'''alter table public.automacao_versoes
            alter column origem set default 'manual';

          update public.automacao_versoes
             set origem = 'manual'
           where origem is null;

          alter table public.automacao_versoes
            alter column origem set not null;

          create index if not exists automacao_versoes_empresa_fluxo_versao_idx
            on public.automacao_versoes (empresa_id, fluxo_id, versao desc);

          create or replace function public.registrar_versao_automacao_fluxo(
            p_empresa_id uuid,
            p_fluxo_id uuid,
            p_usuario_id uuid default null,
            p_origem text default 'manual',
            p_descricao text default null
          )
          returns jsonb
          language plpgsql
          security definer
          set search_path = public, pg_temp
          as $function$
          declare
            v_snapshot jsonb;
            v_ultima_snapshot jsonb;
            v_ultima_versao integer;
            v_ultima_id uuid;
            v_nova_versao integer;
            v_nova_id uuid;
          begin
            if p_empresa_id is null or p_fluxo_id is null then
              raise exception using
                errcode = '22023',
                message = 'Empresa e fluxo sao obrigatorios para registrar uma versao.';
            end if;

            perform pg_advisory_xact_lock(hashtextextended(p_fluxo_id::text, 0));

            perform 1
              from public.automacao_fluxos
             where id = p_fluxo_id
               and empresa_id = p_empresa_id
             for update;

            if not found then
              raise exception using
                errcode = 'P0002',
                message = 'Fluxo nao encontrado para registrar a versao.';
            end if;

            select jsonb_build_object(
              'schema_version', 1,
              'fluxo', jsonb_build_object(
                'id', fluxo.id,
                'empresa_id', fluxo.empresa_id,
                'nome', fluxo.nome,
                'descricao', fluxo.descricao,
                'status', fluxo.status,
                'canal', fluxo.canal,
                'fluxo_padrao', fluxo.fluxo_padrao,
                'configuracao_json', coalesce(fluxo.configuracao_json, '{}'::jsonb),
                'criado_por', fluxo.criado_por,
                'created_at', fluxo.created_at
              ),
              'nos', coalesce((
                select jsonb_agg(
                  jsonb_build_object(
                    'id', no.id,
                    'tipo_no', no.tipo_no,
                    'titulo', no.titulo,
                    'descricao', no.descricao,
                    'posicao_x', no.posicao_x,
                    'posicao_y', no.posicao_y,
                    'configuracao_json', coalesce(no.configuracao_json, '{}'::jsonb),
                    'delay_segundos', no.delay_segundos
                  )
                  order by no.id
                )
                from public.automacao_nos no
                where no.empresa_id = p_empresa_id
                  and no.fluxo_id = p_fluxo_id
                  and no.ativo is true
              ), '[]'::jsonb),
              'conexoes', coalesce((
                select jsonb_agg(
                  jsonb_build_object(
                    'id', conexao.id,
                    'no_origem_id', conexao.no_origem_id,
                    'no_destino_id', conexao.no_destino_id,
                    'condicao_json', coalesce(conexao.condicao_json, '{}'::jsonb),
                    'rotulo', conexao.rotulo,
                    'ordem', conexao.ordem,
                    'usar_ia', coalesce(conexao.usar_ia, false),
                    'descricao_ia', conexao.descricao_ia
                  )
                  order by conexao.ordem, conexao.id
                )
                from public.automacao_conexoes conexao
                where conexao.empresa_id = p_empresa_id
                  and conexao.fluxo_id = p_fluxo_id
                  and conexao.ativo is true
              ), '[]'::jsonb),
              'gatilhos', coalesce((
                select jsonb_agg(
                  jsonb_build_object(
                    'id', gatilho.id,
                    'tipo_gatilho', gatilho.tipo_gatilho,
                    'valor', gatilho.valor,
                    'condicao', gatilho.condicao,
                    'ativo', gatilho.ativo
                  )
                  order by gatilho.id
                )
                from public.automacao_gatilhos gatilho
                where gatilho.empresa_id = p_empresa_id
                  and gatilho.fluxo_id = p_fluxo_id
              ), '[]'::jsonb)
            )
            into v_snapshot
            from public.automacao_fluxos fluxo
            where fluxo.id = p_fluxo_id
              and fluxo.empresa_id = p_empresa_id;

            select versao, id, snapshot_json
              into v_ultima_versao, v_ultima_id, v_ultima_snapshot
              from public.automacao_versoes
             where empresa_id = p_empresa_id
               and fluxo_id = p_fluxo_id
             order by versao desc
             limit 1;

            if v_ultima_snapshot is not null and v_ultima_snapshot = v_snapshot then
              return jsonb_build_object(
                'criada', false,
                'id', v_ultima_id,
                'versao', v_ultima_versao,
                'motivo', 'snapshot_inalterado'
              );
            end if;

            v_nova_versao := coalesce(v_ultima_versao, 0) + 1;

            insert into public.automacao_versoes (
              empresa_id,
              fluxo_id,
              versao,
              snapshot_json,
              criado_por,
              origem,
              descricao,
              automacao_id,
              nodes_json,
              edges_json,
              created_by
            )
            values (
              p_empresa_id,
              p_fluxo_id,
              v_nova_versao,
              v_snapshot,
              p_usuario_id,
              coalesce(nullif(btrim(p_origem), ''), 'manual'),
              nullif(btrim(coalesce(p_descricao, '')), ''),
              p_fluxo_id,
              v_snapshot -> 'nos',
              v_snapshot -> 'conexoes',
              p_usuario_id
            )
            returning id into v_nova_id;

            return jsonb_build_object(
              'criada', true,
              'id', v_nova_id,
              'versao', v_nova_versao
            );
          end;
          $function$;

          revoke all on function public.registrar_versao_automacao_fluxo(uuid, uuid, uuid, text, text) from public;
          grant execute on function public.registrar_versao_automacao_fluxo(uuid, uuid, uuid, text, text) to service_role;

          create or replace function public.automacao_fluxos_registrar_versao_apos_update()
          returns trigger
          language plpgsql
          security definer
          set search_path = public, pg_temp
          as $function$
          begin
            perform public.registrar_versao_automacao_fluxo(
              new.empresa_id,
              new.id,
              coalesce(new.atualizado_por, new.criado_por),
              case
                when new.nome like '✨ IA - %' then 'assistente_ia'
                else 'salvamento_automatico'
              end,
              'Snapshot automatico apos alteracao do fluxo.'
            );

            return new;
          end;
          $function$;

          drop trigger if exists automacao_fluxos_registrar_versao_apos_update
            on public.automacao_fluxos;

          create trigger automacao_fluxos_registrar_versao_apos_update
          after update of nome, descricao, status, canal, atualizado_por, fluxo_padrao, configuracao_json, updated_at
          on public.automacao_fluxos
          for each row
          execute function public.automacao_fluxos_registrar_versao_apos_update();

          do $backfill$
          declare
            fluxo record;
          begin
            for fluxo in
              select id, empresa_id, coalesce(atualizado_por, criado_por) as usuario_id
                from public.automacao_fluxos
               order by created_at, id
            loop
              perform public.registrar_versao_automacao_fluxo(
                fluxo.empresa_id,
                fluxo.id,
                fluxo.usuario_id,
                'backfill_inicial',
                'Snapshot inicial criado na ativacao do versionamento.'
              );
            end loop;
          end;
          $backfill$;
          '''

          migration_path = Path('supabase/migrations/20260720220000_implementar_versoes_fluxos.sql')
          migration_path.parent.mkdir(parents=True, exist_ok=True)
          migration_path.write_text(migration, encoding='utf-8')

          assistant_path = Path('src/app/api/automacoes/assistente/gerar/route.ts')
          assistant = assistant_path.read_text(encoding='utf-8')
          assistant = replace_once(
              assistant,
              '''async function registrarVersaoAssistenteSeguro(params: {
  empresaId: string;
  fluxoId: string;
  usuarioId: string;
  descricao: string;
  nos: unknown;
  conexoes: unknown;
}) {
  try {
    await supabaseAdmin.from("automacao_versoes").insert({
      empresa_id: params.empresaId,
      automacao_id: params.fluxoId,
      origem: "assistente_ia",
      descricao: params.descricao,
      nodes_json: params.nos,
      edges_json: params.conexoes,
      created_by: params.usuarioId,
    });
  } catch (error) {
    console.warn("[assistente-fluxos] nao foi possivel registrar versao", error);
  }
}''',
              '''async function registrarVersaoAssistenteSeguro(params: {
  empresaId: string;
  fluxoId: string;
  usuarioId: string;
  descricao: string;
  nos: unknown;
  conexoes: unknown;
}) {
  const { error } = await supabaseAdmin.rpc(
    "registrar_versao_automacao_fluxo",
    {
      p_empresa_id: params.empresaId,
      p_fluxo_id: params.fluxoId,
      p_usuario_id: params.usuarioId,
      p_origem: "assistente_ia",
      p_descricao: params.descricao,
    }
  );

  if (error) {
    console.warn("[assistente-fluxos] nao foi possivel registrar versao", error);
  }
}''',
              'registro de versao do assistente'
          )
          assistant_path.write_text(assistant, encoding='utf-8')

          route_path = Path('src/app/api/automacoes/route.ts')
          route = route_path.read_text(encoding='utf-8')

          route = replace_once(
              route,
              '''      gatilhosCriados = gatilhosInseridos || [];
    }

    await registrarLogAuditoriaSeguro({''',
              '''      gatilhosCriados = gatilhosInseridos || [];
    }

    const { error: versaoInicialError } = await supabaseAdmin.rpc(
      "registrar_versao_automacao_fluxo",
      {
        p_empresa_id: usuario.empresa_id,
        p_fluxo_id: data.id,
        p_usuario_id: usuario.id,
        p_origem: "criacao_manual",
        p_descricao: "Versao inicial do fluxo criado manualmente.",
      }
    );

    if (versaoInicialError) {
      await removerFluxoCriadoComFalha({
        empresaId: usuario.empresa_id,
        fluxoId: data.id,
      });

      return NextResponse.json(
        {
          ok: false,
          error: `Houve erro ao registrar a versao inicial do fluxo: ${versaoInicialError.message}`,
        },
        { status: 500 }
      );
    }

    await registrarLogAuditoriaSeguro({''',
              'versao inicial na criacao manual'
          )

          route = replace_once(
              route,
              '''    if (atualizacao.fluxo_padrao === true) {
      const { error: gatilhosError } = await supabaseAdmin
        .from("automacao_gatilhos")
        .delete()
        .eq("empresa_id", usuario.empresa_id)
        .eq("fluxo_id", id);

      if (gatilhosError) {
        return NextResponse.json(
          {
            ok: false,
            error: `Fluxo atualizado, mas houve erro ao remover gatilhos: ${gatilhosError.message}`,
          },
          { status: 500 }
        );
      }
    }

    const statusAntes = String(fluxoAntes?.status || "");''',
              '''    if (atualizacao.fluxo_padrao === true) {
      const { error: gatilhosError } = await supabaseAdmin
        .from("automacao_gatilhos")
        .delete()
        .eq("empresa_id", usuario.empresa_id)
        .eq("fluxo_id", id);

      if (gatilhosError) {
        return NextResponse.json(
          {
            ok: false,
            error: `Fluxo atualizado, mas houve erro ao remover gatilhos: ${gatilhosError.message}`,
          },
          { status: 500 }
        );
      }
    }

    const { error: versaoAtualizacaoError } = await supabaseAdmin.rpc(
      "registrar_versao_automacao_fluxo",
      {
        p_empresa_id: usuario.empresa_id,
        p_fluxo_id: id,
        p_usuario_id: usuario.id,
        p_origem: "atualizacao_manual",
        p_descricao: "Fluxo atualizado pelo usuario.",
      }
    );

    if (versaoAtualizacaoError) {
      return NextResponse.json(
        {
          ok: false,
          error: `Fluxo atualizado, mas houve erro ao registrar a versao: ${versaoAtualizacaoError.message}`,
        },
        { status: 500 }
      );
    }

    const statusAntes = String(fluxoAntes?.status || "");''',
              'versao apos atualizacao do fluxo'
          )

          route = replace_once(
              route,
              '''    if (conexoesDuplicadas.length > 0) {
      const { error: inserirConexoesError } = await supabaseAdmin
        .from("automacao_conexoes")
        .insert(conexoesDuplicadas);

      if (inserirConexoesError) {
        return NextResponse.json(
          { ok: false, error: inserirConexoesError.message },
          { status: 500 }
        );
      }
    }

    await registrarLogAuditoriaSeguro({''',
              '''    if (conexoesDuplicadas.length > 0) {
      const { error: inserirConexoesError } = await supabaseAdmin
        .from("automacao_conexoes")
        .insert(conexoesDuplicadas);

      if (inserirConexoesError) {
        return NextResponse.json(
          { ok: false, error: inserirConexoesError.message },
          { status: 500 }
        );
      }
    }

    const { error: versaoDuplicacaoError } = await supabaseAdmin.rpc(
      "registrar_versao_automacao_fluxo",
      {
        p_empresa_id: usuario.empresa_id,
        p_fluxo_id: novoFluxo.id,
        p_usuario_id: usuario.id,
        p_origem: "duplicacao",
        p_descricao: `Versao inicial da copia do fluxo ${fluxoOriginal.nome}.`,
      }
    );

    if (versaoDuplicacaoError) {
      await removerFluxoCriadoComFalha({
        empresaId: usuario.empresa_id,
        fluxoId: novoFluxo.id,
      });

      return NextResponse.json(
        {
          ok: false,
          error: `Houve erro ao registrar a versao da copia: ${versaoDuplicacaoError.message}`,
        },
        { status: 500 }
      );
    }

    await registrarLogAuditoriaSeguro({''',
              'versao inicial da duplicacao'
          )

          route_path.write_text(route, encoding='utf-8')

          sharing_path = Path('src/lib/automacoes/compartilhamento-fluxos.ts')
          sharing = sharing_path.read_text(encoding='utf-8')
          sharing = replace_once(
              sharing,
              '''  if (gatilhosParaInserir.length > 0) {
    const { error: inserirGatilhosError } = await supabase
      .from("automacao_gatilhos")
      .insert(gatilhosParaInserir);

    if (inserirGatilhosError) {
      await supabase
        .from("automacao_conexoes")
        .delete()
        .eq("empresa_id", empresaDestinoId)
        .eq("fluxo_id", novoFluxo.id);
      await supabase
        .from("automacao_nos")
        .delete()
        .eq("empresa_id", empresaDestinoId)
        .eq("fluxo_id", novoFluxo.id);
      await supabase
        .from("automacao_fluxos")
        .delete()
        .eq("empresa_id", empresaDestinoId)
        .eq("id", novoFluxo.id);

      throw new Error(
        `Erro ao importar gatilhos: ${inserirGatilhosError.message}`
      );
    }
  }

  return {''',
              '''  if (gatilhosParaInserir.length > 0) {
    const { error: inserirGatilhosError } = await supabase
      .from("automacao_gatilhos")
      .insert(gatilhosParaInserir);

    if (inserirGatilhosError) {
      await supabase
        .from("automacao_conexoes")
        .delete()
        .eq("empresa_id", empresaDestinoId)
        .eq("fluxo_id", novoFluxo.id);
      await supabase
        .from("automacao_nos")
        .delete()
        .eq("empresa_id", empresaDestinoId)
        .eq("fluxo_id", novoFluxo.id);
      await supabase
        .from("automacao_fluxos")
        .delete()
        .eq("empresa_id", empresaDestinoId)
        .eq("id", novoFluxo.id);

      throw new Error(
        `Erro ao importar gatilhos: ${inserirGatilhosError.message}`
      );
    }
  }

  const { error: versaoImportacaoError } = await supabase.rpc(
    "registrar_versao_automacao_fluxo",
    {
      p_empresa_id: empresaDestinoId,
      p_fluxo_id: novoFluxo.id,
      p_usuario_id: usuarioId,
      p_origem: "importacao_compartilhamento",
      p_descricao: "Versao inicial do fluxo importado por compartilhamento.",
    }
  );

  if (versaoImportacaoError) {
    await supabase
      .from("automacao_fluxos")
      .delete()
      .eq("empresa_id", empresaDestinoId)
      .eq("id", novoFluxo.id);

    throw new Error(
      `Erro ao registrar versao do fluxo importado: ${versaoImportacaoError.message}`
    );
  }

  return {''',
              'versao inicial da importacao'
          )
          sharing_path.write_text(sharing, encoding='utf-8')
          PY

      - name: Validar build
        run: npm ci && npm run build

      - name: Publicar alteracoes
        shell: bash
        run: |
          rm -f .github/workflows/implementar-versoes-fluxos.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/api/automacoes/assistente/gerar/route.ts \
                  src/app/api/automacoes/route.ts \
                  src/lib/automacoes/compartilhamento-fluxos.ts \
                  supabase/migrations/20260720220000_implementar_versoes_fluxos.sql \
                  .github/workflows/implementar-versoes-fluxos.yml
          git commit -m "Implementa versionamento interno de fluxos"
          git push origin main
