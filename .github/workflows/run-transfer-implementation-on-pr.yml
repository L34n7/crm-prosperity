name: Executar implementacao de transferencia

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/implement-transfer-distribution.yml
      - .github/workflows/run-transfer-implementation-on-pr.yml

permissions:
  contents: write

jobs:
  implement:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout da branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Extrair e aplicar alteracoes
        shell: bash
        run: |
          awk '/python <<'"'"'PY'"'"'/{flag=1;next} /^[[:space:]]*PY[[:space:]]*$/{flag=0} flag { sub(/^          /, ""); print }' \
            .github/workflows/implement-transfer-distribution.yml > /tmp/aplicar-transferencia.py
          python - <<'PY'
          from pathlib import Path
          path = Path('/tmp/aplicar-transferencia.py')
          source = path.read_text(encoding='utf-8')
          source = source.replace(
              "'''      setSetores(json.setores || []);\n  } catch (error: any) {'''",
              "'''      setSetores(json.setores || []);\n    } catch (error: any) {'''",
          )
          source = source.replace(
              "'''      setSetores(json.setores || []);\n  setAtendentes(json.atendentes || []);\n  } catch (error: any) {'''",
              "'''      setSetores(json.setores || []);\n      setAtendentes(json.atendentes || []);\n    } catch (error: any) {'''",
          )
          path.write_text(source, encoding='utf-8')
          PY
          set +e
          python /tmp/aplicar-transferencia.py > /tmp/implementacao-transferencia.log 2>&1
          status=$?
          set -e
          cat /tmp/implementacao-transferencia.log
          if [ "$status" -ne 0 ]; then
            git reset --hard HEAD
            cp /tmp/implementacao-transferencia.log implementation-error.log
            git config user.name "CRM Prosperity Automation"
            git config user.email "actions@users.noreply.github.com"
            git add implementation-error.log
            git commit -m "Registrar erro da implementacao de transferencias"
            git push origin HEAD:${{ github.head_ref }}
            exit "$status"
          fi

      - name: Instalar dependencias
        run: npm ci

      - name: Validar TypeScript
        run: npx tsc --noEmit

      - name: Testar distribuicao
        run: node --disable-warning=MODULE_TYPELESS_PACKAGE_JSON --test tests/transferencia-atendente.test.mts

      - name: Publicar codigo validado
        shell: bash
        run: |
          rm -f .github/workflows/run-transfer-implementation-on-pr.yml
          rm -f implementation-error.log
          git config user.name "CRM Prosperity Automation"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Adicionar distribuicao de atendentes nas transferencias"
          git push origin HEAD:${{ github.head_ref }}
